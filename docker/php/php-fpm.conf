; ============================================================
; PHP-FPM www pool configuration
; ============================================================

[www]

; Run as the www-data user (non-root)
user  = www-data
group = www-data

; Listen on TCP socket so Nginx can reach it via 127.0.0.1:9000
; (Both processes run in the same container under Supervisor)
listen = 127.0.0.1:9000
listen.owner = www-data
listen.group = www-data

; Process manager — dynamic is best for containers with known memory limits
pm = dynamic

; Maximum number of child processes
pm.max_children = 20

; Number of processes created on startup
pm.start_servers = 4

; Minimum idle server processes
pm.min_spare_servers = 2

; Maximum idle server processes
pm.max_spare_servers = 6

; Recycle workers after this many requests to prevent memory leaks
pm.max_requests = 500

; Timeouts
request_terminate_timeout = 300
request_slowlog_timeout = 30s
slowlog = /var/log/php/fpm-slow.log

; Pass environment variables through to PHP scripts
; IMPORTANT: required so Laravel can read Render's env vars
clear_env = no

; Catch output and funnel to logs
catch_workers_output = yes
decorate_workers_output = no

; Status page (useful for health checks — only accessible internally)
pm.status_path = /fpm-status
ping.path = /fpm-ping
ping.response = pong
