; ============================================================
; PHP production overrides for crypto-exchange Laravel app
; ============================================================

[PHP]
; Error handling — disable display in production, log only
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /var/log/php/error.log
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Execution limits
max_execution_time = 300
max_input_time = 300
memory_limit = 256M

; Upload limits
upload_max_filesize = 50M
post_max_size = 50M
max_file_uploads = 20

; Timezone (override per-app in APP_TIMEZONE env if needed)
date.timezone = UTC

; Output buffering
output_buffering = 4096

; Realpath cache — speeds up file stat calls in Laravel
realpath_cache_size = 4096k
realpath_cache_ttl = 600

; OPcache — essential for production performance
[opcache]
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 60
opcache.validate_timestamps = 0
opcache.save_comments = 1
opcache.fast_shutdown = 1

; Session
[Session]
session.cookie_secure = 1
session.cookie_httponly = 1
session.cookie_samesite = Lax
session.gc_maxlifetime = 7200
